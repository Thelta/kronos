[project]
name = "kronos-train"
version = "0.1.0"
description = "Synthetic card training pipeline for Kronos."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "kronos-shared",
    "numpy>=1.26.0",
    "pillow>=10.3.0",
    "timm>=1.0.7",
    "torch>=2.2.0",
    "torchvision>=0.17.0",
    "ultralytics>=8.4.19",
]

[tool.uv.sources]
kronos-shared = { workspace = true }
torch = { index = "pytorch-cu124" }
torchvision = { index = "pytorch-cu124" }

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[project.scripts]
kronos-train = "kronos_train.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
